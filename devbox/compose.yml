services:
  dataflow_api:
    build:
      context: ../api_fastapi
      dockerfile: Dockerfile
    container_name: dataflow-api
    ports:
      - "8000:8000"
    volumes:
      - ../api_fastapi:/app
    env_file:
      - ../api_fastapi/.env
    depends_on:
      dataflow_postgres:
        condition: service_healthy
      dataflow_otel_lgtm:
        condition: service_started
    command: >
      sh -c "
        uv run alembic upgrade head &&
        uv run python scripts/seed_admin.py &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - dataflow_network

  dataflow_postgres:
    image: postgres:17
    container_name: dataflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dataflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dataflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "5432:5432"
    networks:
      - dataflow_network

  dataflow_otel_lgtm:
    image: grafana/otel-lgtm:latest
    container_name: dataflow-otel-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - dataflow_network

networks:
  dataflow_network:
    driver: bridge

volumes:
  postgres_data: